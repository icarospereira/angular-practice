<div>
    <h1>Gerenciador de Tarefas</h1>

    <div>
        <input type="text" 
            [ngModel]="newTaskDescription()"
            (ngModelChange)="newTaskDescription.set($event)"
            placeholder="Nova tarefa...">
        <button (click)="addTask()">Criar Tarefa</button>
    </div>

    <hr>

    @if (taskList().length > 0) {
    <ul>
        @for (task of taskList(); track task.id) {
            <app-task-item 
                [taskData]="task"
                (onRemove)="deleteTask($event)"
                (onToggle)="toggleTaskStatus(task)">
            </app-task-item>            
        }
    </ul>
    }@else{
    <p>Parabéns! Não tens tarefas pendentes.</p>
    }

</div>
